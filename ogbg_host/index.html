<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OGBG - Server Panel</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
        }
        #layout {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
        }
        #mapHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        #mapName {
            font-size: 20px;
        }
        #changeMapBtn {
            background: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #changeMapBtn:hover {
            background: #444;
            border-color: #ffd400;
            color: #ffd400;
        }
        #playerList {
            height: 80%;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
        }
        #main {
            flex: 1;
            position: relative;
        }
        #mapCanvas {
            width: 100%;
            height: 100%;
            background: #000;
            pointer-events: none;
        }
        
        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        
        .modal-header h2 {
            margin: 0;
            font-size: 18px;
            color: #ffd400;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: #333;
            color: #fff;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 14px;
        }
        
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: #eee;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .form-group select:hover {
            border-color: #ffd400;
        }
        
        .form-group select:focus {
            outline: none;
            border-color: #ffd400;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .modal-btn-primary {
            background: #ffd400;
            color: #000;
            border-color: #ffd400;
        }
        
        .modal-btn-primary:hover {
            background: #ffdb33;
        }
        
        .modal-btn-secondary {
            background: #333;
            color: #eee;
        }
        
        .modal-btn-secondary:hover {
            background: #444;
        }

        /* PLAYER ROW */
        .player-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:6px 4px;
            border-bottom:1px solid #222;
        }

        .player-options-btn {
            background:#333;
            color:#eee;
            border:1px solid #555;
            border-radius:4px;
            padding:2px 8px;
            cursor:pointer;
        }

        /* ===== TOPBAR ===== */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #151515;
            border-bottom: 1px solid #333;
            display: flex;
            z-index: 2000;
        }

        /* mesma largura da sidebar */
        #topbar-left {
            width: 300px;
            display: flex;
            align-items: center;
            padding-left: 15px;
            border-right: 1px solid #333;
        }

        #companyLogo {
            height: 40px;
        }

        /* área de botões */
        #topbar-right {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 15px;
        }

        .tool-btn {
            background: #222;
            color: #eee;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .tool-btn:hover {
            border-color: #ffd400;
            color: #ffd400;
        }

        /* empurra layout para baixo da toolbar */
        #layout {
            margin-top: 60px;
        }

        /* ===== CONSOLE ===== */
        #consoleLog {
            height: 250px;
            background: #000;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }

            background: #222;
            border: 1px solid #333;
            color: #eee;
            padding: 8px;
        }

        /* ===== CONSOLE ===== */

        const consoleModal = document.getElementById("consoleModal");
        const openConsoleBtn = document.getElementById("openConsoleBtn");
        const closeConsoleBtn = document.getElementById("closeConsoleBtn");
        const consoleInput = document.getElementById("consoleInput");
        const consoleLog = document.getElementById("consoleLog");
        const sendConsoleCmd = document.getElementById("sendConsoleCmd");

        openConsoleBtn.onclick = () => consoleModal.style.display = "flex";
        closeConsoleBtn.onclick = () => consoleModal.style.display = "none";
        consoleModal.onclick = e => { if(e.target===consoleModal) consoleModal.style.display="none"; };

        function logConsole(text, color="#0f0")
        {
            const line = document.createElement("div");
            line.textContent = text;
            line.style.color = color;
            consoleLog.appendChild(line);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        function sendConsoleCommand()
        {
            const cmd = consoleInput.value.trim();
            if(!cmd) return;

            logConsole("> " + cmd, "#ffd400");

            ws.send(JSON.stringify({
                type: "server_console",
                command: cmd
            }));

            consoleInput.value = "";
        }

        sendConsoleCmd.onclick = sendConsoleCommand;

        consoleInput.addEventListener("keydown", e => {
            if(e.key === "Enter") sendConsoleCommand();
        });

        function resizeCanvas() 
        {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const playerFOV = new Image();
        playerFOV.src = "ui/team04_mapplayer_FOV.png";

        /* ícones de times */
        const teamIcons = {};
        const TEAM_NUMBER_ICON_FILES = {
            "00": "ui/team_playericon_player00.png",
            "01": "ui/team_playericon_player01.png",
            "02": "ui/team_playericon_player02.png"
        };

        /* arquivos de minimap */
        let currentMapImage = null;
        let currentMapName = "";

        const MAP_FILES = {
            "PUBG_Desert": "ui/maps/Miramar_Minimap.png",
            "PUBG_Forest": "ui/maps/Erangel_Minimap.png",
            "shooting_range4": "ui/maps/Shooting_Range_Map.png"
        };

        /* limites do mundo para cada mapa */
        const MAP_BOUNDS = {
            "shooting_range4": { minX:-1488.88, minY:-1488.88, maxX:60461.13, maxY:60461.13 },
            "PUBG_Desert": { minX:0.0, minY:0.0, maxX:804480.50, maxY:803926.75 },
            "PUBG_Forest": { minX:0.0, minY:0.0, maxX:805665.81, maxY:805226.94 }
        };

        /* carrega imagem do mapa */
        function loadMapImage(mapName) 
        {
            if (currentMapName === mapName) return;
            currentMapName = mapName;
            const path = MAP_FILES[mapName];
            if (!path) 
            {
                currentMapImage = null;
                return;
            }
            const img = new Image();
            img.onload = () => {
                currentMapImage = img;
                drawPlayers(currentPlayers);
            };
            img.src = path;
        }

        /* carrega imagem do time on-the-fly */
        function loadTeamIcon(teamId) {
            if(teamIcons[teamId]) return; // já carregado
            const path = TEAM_NUMBER_ICON_FILES[teamId];
            if(!path) return;
            const img = new Image();
            img.onload = () => {
                teamIcons[teamId] = img;
                drawPlayers(currentPlayers);
            };
            img.onerror = () => console.error(`Erro ao carregar ícone do time ${teamId}`);
            img.src = path;
            teamIcons[teamId] = img; // coloca imediatamente para não reiniciar
        }

        /* converte posição do jogo → pixel do canvas */
        function worldToMap(x, y) {
            const b = MAP_BOUNDS[currentMapName];
            if (!b) return { x:0, y:0 };
            
            const nx = (x - b.minX) / (b.maxX - b.minX);
            const ny = (y - b.minY) / (b.maxY - b.minY);
            
            return { 
                x: mapDrawRect.x + nx * mapDrawRect.w, 
                y: mapDrawRect.y + ny * mapDrawRect.h 
            };
        }

        /* desenha mapa mantendo proporção */
        function drawMap() {
            if (!currentMapImage) return;
            
            const img = currentMapImage;
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;
            
            mapDrawRect = { x, y, w, h };
            ctx.drawImage(img, x, y, w, h);
        }

        /* desenha a label do jogador com caixa + ícone + nome */
        function drawPlayerLabel(ctx, x, y, name, teamId) {
            const height = 20;
            const badgeSize = height;
            const gap = 8;
            const paddingRight = 10;
            
            ctx.font = "13px Arial";
            ctx.textBaseline = "middle";
            const textWidth = ctx.measureText(name).width;
            const width = badgeSize + gap + textWidth + paddingRight;
            
            const boxX = x - 10;
            const boxY = y - 35;

            // Caixa escura
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.fillRect(boxX, boxY, width, height);

            // Badge amarelo de fundo sempre visível
            const badgeX = boxX;
            const badgeY = boxY;
            ctx.fillStyle = "#ffd400";
            ctx.fillRect(badgeX, badgeY, badgeSize, badgeSize);

            // Ícone do time
            let icon = teamIcons[teamId];
            if (!icon) loadTeamIcon(teamId);
            if (icon && icon.complete) {
                ctx.drawImage(icon, badgeX, badgeY, badgeSize, badgeSize);
            }

            // Nome
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "left";
            ctx.fillText(name, badgeX + badgeSize + gap, boxY + height / 2);
        }

        /* desenha todos os jogadores */
        function drawPlayers(players) {
            currentPlayers = players; // guarda referência para redraw
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();

            for (const p of players) {
                const pos = worldToMap(p.x, p.y);
                
                /* bola amarela */
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ffd400";
                ctx.fill();

                /* centro branco */
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 2, 0, Math.PI*2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();

                /* FOV */
                if(playerFOV.complete) {
                    ctx.save();
                    ctx.translate(pos.x, pos.y);
                    const angle = Number(p.yaw || 0) * Math.PI / 180;
                    ctx.rotate(angle);
                    const size = 150;
                    ctx.drawImage(playerFOV, -size/2, -size/2, size, size);
                    ctx.restore();
                }

                /* label com ícone */
                drawPlayerLabel(ctx, pos.x, pos.y, p.name, p.teamId || "00");
            }
        }

        playerListEl.addEventListener("click", (e) => {

        let lastPlayerListUpdate = 0;
        const PLAYER_LIST_UPDATE_INTERVAL = 5000; // 3 segundos (ajuste aqui)


        /* ===== PLAYER LIST ===== */
        function updatePlayerList(players)
        {
            const now = performance.now();

            if (now - lastPlayerListUpdate < PLAYER_LIST_UPDATE_INTERVAL)
                return; // ignora atualização

            lastPlayerListUpdate = now;

            currentPlayers = players;
            playerListEl.innerHTML = "";

            players.forEach((p, index) => {
                const row = document.createElement("div");
                row.className = "player-row";

                const name = document.createElement("div");
                name.textContent = p.name;

                const btn = document.createElement("button");
                btn.className = "player-options-btn";
                btn.textContent = "⋮";
                btn.dataset.index = index;

                row.appendChild(name);
                row.appendChild(btn);
                playerListEl.appendChild(row);
            });
        }

        /* ===== PLAYER MODAL ===== */
        function openPlayerModal(player)
        {
            if(!playerModal) {
                console.error("playerModal não encontrado no DOM");
                return;
            }

            selectedPlayer = player;
            playerModalTitle.textContent = "Player: " + player.name;
            playerModal.style.display = "flex";
        }

            if(!selectedPlayer) return;

            ws.send(JSON.stringify({

                name:selectedPlayer.name

            playerModal.style.display="none";

        /* WebSocket */
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if(data.type === "snapshot") {
                mapNameEl.textContent = "Map: " + data.map;
                playerCountEl.textContent = data.players.length;
                loadMapImage(data.map);
                updatePlayerList(data.players);
                drawPlayers(data.players);
            }
            
            // Resposta do servidor para mudança de mapa
            if(data.type === "map_changed") {
                // Opcional: mostrar notificação de sucesso
                console.log(`Map changed to ${data.map} with mode ${data.gameMode}`);
            }
        
            if(data.type === "console_result")
            {
                logConsole(data.output || "OK", "#0f0");
            }

            if(data.type === "console_error")
            {
                logConsole(data.error || "ERROR", "#f33");
            }
        };

        ws.onopen = () => console.log("connected");
        ws.onclose = () => console.log("disconnected");
    </script>
